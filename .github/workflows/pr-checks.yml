name: PR Checks

# Runs build validation and accessibility checks on every pull request to main.
# The `pr-status` job is the required check in branch protection.
#
# Expensive checks are skipped when only documentation/context files changed.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.check.outputs.code_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: check
        run: |
          git fetch origin main

          # List changed files, filtering out documentation-only paths.
          # If anything outside these patterns changed, treat it as a code change.
          CHANGED=$(git diff --name-only origin/main...HEAD \
            | grep -vE '^(contexts/|[^/]+\.md$|public/assets/images/)' \
            | head -1)

          if [[ -n "${CHANGED}" ]]; then
            echo "Code changes detected"
            echo "code_changed=true" >> $GITHUB_OUTPUT
          else
            echo "Only documentation changes detected — skipping expensive checks"
            echo "code_changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Test Site
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        # Writes src/data/buildinfo.ts before the Astro build so components
        # can import version/commit information at build time.
        # This file is gitignored and generated fresh in every CI run.
        run: |
          BUILD_DATE=$(TZ=${{ vars.TIMEZONE }} date +'%-d %B %Y')
          cat > src/data/buildinfo.ts << HEREDOC
          // Auto-generated by CI/CD. Do not edit manually.
          export const buildInfo = {
            commit: "${{ github.sha }}",
            buildId: "${{ github.run_id }}",
            buildDate: "${BUILD_DATE}",
            version: "pr-${{ github.event.pull_request.number }}",
            buildName: "${{ github.workflow }}",
          } as const;
          HEREDOC

      - name: Build site
        env:
          CONTENT_RELAY_URL: ${{ secrets.CONTENT_RELAY_URL }}
          CONTENT_RELAY_READ_KEY: ${{ secrets.CONTENT_RELAY_READ_KEYS }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: pr-site-build
          path: dist/
          retention-days: 1

  accessibility:
    name: Accessibility Checks
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.code_changed == 'true' && needs.build.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: pr-site-build
          path: dist/

      - name: Serve built site
        run: |
          npx serve dist/client/ -l 8000 &
          # Poll until server is ready (up to 60 seconds)
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000 > /dev/null && echo "Server ready" && break
            echo "Waiting for server... (attempt $i/30)"
            sleep 2
          done

      - name: Run accessibility checks
        id: a11y
        continue-on-error: true
        env:
          A11Y_BASE_URL: http://localhost:8000
        run: node scripts/a11y-check.js

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: accessibility-report
          path: accessibility-report.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail if accessibility checks failed
        if: steps.a11y.outcome == 'failure'
        run: |
          echo "::error::Accessibility checks failed. Download the accessibility-report artifact for details."
          exit 1

  # Required check — this is the job name configured in branch protection.
  # Passes when all checks succeed, or when only documentation changed.
  pr-status:
    name: PR Status
    runs-on: ubuntu-latest
    needs: [detect-changes, build, accessibility]
    if: always()

    steps:
      - name: Check overall status
        run: |
          CODE_CHANGED="${{ needs.detect-changes.outputs.code_changed }}"

          if [[ "${CODE_CHANGED}" == "false" ]]; then
            echo "::notice::Only documentation changes — PR checks skipped."
            exit 0
          fi

          BUILD_RESULT="${{ needs.build.result }}"
          A11Y_RESULT="${{ needs.accessibility.result }}"

          if [[ "${BUILD_RESULT}" != "success" ]]; then
            echo "::error::Build failed (result: ${BUILD_RESULT})."
            exit 1
          fi

          if [[ "${A11Y_RESULT}" != "success" ]]; then
            echo "::error::Accessibility checks failed (result: ${A11Y_RESULT})."
            exit 1
          fi

          echo "All checks passed."
