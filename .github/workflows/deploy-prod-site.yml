name: Deploy Prod Site (Code Release)

# Triggered by pushing a version tag (vX.Y.Z) or manually.
# Validates the tag, builds from main, deploys to Cloudflare Workers,
# and creates a GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v14.0.0)'
        required: true
        type: string

jobs:
  validate-tag:
    name: Validate Tag and Branch
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract and validate tag
        id: extract
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "Processing tag: ${TAG}"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${TAG}' does not match required format 'vX.Y.Z'"
            exit 1
          fi

          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Validate tag is on main branch
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          TAG_SHA=$(git rev-list -n 1 "${TAG}" 2>/dev/null || echo "")

          if [[ -z "${TAG_SHA}" ]]; then
            echo "::error::Could not find commit for tag '${TAG}'"
            exit 1
          fi

          git fetch origin main

          if git merge-base --is-ancestor "${TAG_SHA}" origin/main; then
            echo "✓ Tag '${TAG}' is reachable from main branch"
          else
            echo "::error::Tag '${TAG}' is not on the main branch. Production tags must be created from main."
            exit 1
          fi

  build-prod:
    name: Build Production Site
    runs-on: ubuntu-latest
    needs: validate-tag
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          args: --accept-dns=true

      - name: Generate build info
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          cat > src/data/buildinfo.ts << HEREDOC
          // Auto-generated by CI/CD. Do not edit manually.
          export const buildInfo = {
            commit: "${{ github.sha }}",
            buildId: "${{ github.run_id }}",
            version: "${VERSION}",
            buildName: "${{ github.workflow }}",
          } as const;
          HEREDOC

      - name: Build site
        env:
          CONTENT_RELAY_URL: ${{ secrets.PROD_CMS_REST_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: prod-site
          path: dist/
          retention-days: 1

  deploy-prod:
    name: Deploy Production Site
    runs-on: ubuntu-latest
    needs: [validate-tag, build-prod]
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: prod-site
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-prod, deploy-prod]
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ needs.validate-tag.outputs.version }} \
            --title "${{ needs.validate-tag.outputs.version }}" \
            --generate-notes \
            --verify-tag
