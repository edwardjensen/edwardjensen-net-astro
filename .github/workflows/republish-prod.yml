name: Republish Production Site

# Rebuilds and redeploys the production site with the latest CMS content.
# Connects to the production CMS directly via Tailscale VPN, builds from the
# latest production tag, and deploys.
#
# Triggers on CMS publish events (content or photography) or manual dispatch.
#
# NOTE: The content relay refresh step has been temporarily removed. Builds now
# fetch directly from the CMS. See contexts/CONTENT_RELAY_BYPASS.md.

permissions:
  contents: read

on:
  workflow_dispatch:
  repository_dispatch:
    types: ['prod_cms_publish', 'prod_cms_photo_publish']

jobs:
  build-and-deploy:
    name: Build and Deploy Site
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Checkout latest production tag
        run: |
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)

          if [[ -z "${LATEST_TAG}" ]]; then
            echo "::error::No production tag found. Create a tag before republishing."
            exit 1
          fi

          echo "Checking out: ${LATEST_TAG}"
          git checkout "${LATEST_TAG}"
          echo "LATEST_TAG=${LATEST_TAG}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          args: --accept-dns=true

      - name: Generate build info
        run: |
          BUILD_DATE=$(TZ=${{ vars.TIMEZONE }} date +'%-d %B %Y')
          cat > src/data/buildinfo.ts << HEREDOC
          // Auto-generated by CI/CD. Do not edit manually.
          export const buildInfo = {
            commit: "${{ github.sha }}",
            buildId: "${{ github.run_id }}",
            buildDate: "${BUILD_DATE}",
            version: "${LATEST_TAG}",
            buildName: "${{ github.workflow }}",
          } as const;
          HEREDOC

      - name: Build site
        env:
          CONTENT_RELAY_URL: ${{ secrets.PROD_CMS_REST_URL }}
        run: npm run build

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Workers
        # Uses the adapter-generated dist/server/wrangler.json which has the correct
        # entry point (dist/server/entry.mjs) and asset paths (dist/client/).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config dist/server/wrangler.json --name ${{ secrets.CF_DEPLOYMENT_WORKER }}
