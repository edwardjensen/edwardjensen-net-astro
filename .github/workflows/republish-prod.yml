name: Republish Production Site

# Rebuilds and redeploys the production site with the latest CMS content.
# First refreshes the Cloudflare KV content relay from the CMS (via Tailscale VPN),
# then builds from the latest production tag and deploys.
#
# Triggers on CMS publish events (content or photography) or manual dispatch.

permissions:
  contents: read

on:
  workflow_dispatch:
  repository_dispatch:
    types: ['prod_cms_publish', 'prod_cms_photo_publish']

jobs:
  refresh-relay:
    name: Refresh Content Relay
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          args: --accept-dns=true

      - name: Refresh content relay
        env:
          CMS_REST_URL: ${{ secrets.CMS_URL }}/api/v2
          CONTENT_RELAY_URL: ${{ secrets.CONTENT_RELAY_URL }}
          CONTENT_RELAY_API_KEY: ${{ secrets.CONTENT_RELAY_API_KEY }}
        run: node scripts/refresh-content-relay.js

  build-and-deploy:
    name: Build and Deploy Site
    runs-on: ubuntu-latest
    needs: refresh-relay
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Checkout latest production tag
        run: |
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)

          if [[ -z "${LATEST_TAG}" ]]; then
            echo "::error::No production tag found. Create a tag before republishing."
            exit 1
          fi

          echo "Checking out: ${LATEST_TAG}"
          git checkout "${LATEST_TAG}"
          echo "LATEST_TAG=${LATEST_TAG}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        run: |
          cat > src/data/buildinfo.ts << HEREDOC
          // Auto-generated by CI/CD. Do not edit manually.
          export const buildInfo = {
            commit: "${{ github.sha }}",
            buildId: "${{ github.run_id }}",
            version: "${LATEST_TAG}",
            buildName: "${{ github.workflow }}",
          } as const;
          HEREDOC

      - name: Build site
        env:
          CONTENT_RELAY_URL: ${{ secrets.CONTENT_RELAY_URL }}
          REST_API_KEY: ${{ secrets.REST_API_KEY }}
        run: npm run build

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy
