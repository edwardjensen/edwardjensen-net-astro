name: Deploy Staging Site (Direct CMS)

# Simplified staging deployment: builds main branch from the production CMS
# via Tailscale VPN and deploys to the Cloudflare staging worker.
#
# This is a temporary replacement for deploy-staging.yml while the content
# relay architecture is being redesigned. See contexts/CONTENT_RELAY_BYPASS.md.
#
# Deploys to the "staging" wrangler environment (edwardjensen-net-astro-staging),
# a separate worker from production. Does not touch production traffic.

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy to Cloudflare Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          args: --accept-dns=true

      - name: Generate build info
        run: |
          cat > src/data/buildinfo.ts << HEREDOC
          // Auto-generated by CI/CD. Do not edit manually.
          export const buildInfo = {
            commit: "${{ github.sha }}",
            buildId: "${{ github.run_id }}",
            version: "main-$(git rev-parse --short HEAD)",
            buildName: "${{ github.workflow }}",
            siteTitle: "Edward Jensen [STAGING]",
          } as const;
          HEREDOC

      - name: Build site
        env:
          CONTENT_RELAY_URL: ${{ secrets.PROD_CMS_REST_URL }}
        run: npm run build

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Workers (staging environment)
        # Deploys to the "staging" wrangler environment using the worker name from
        # secrets.CF_DEPLOYMENT_WORKER (set per-environment in GitHub).
        # Does not touch the production worker.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --env staging --name ${{ secrets.CF_DEPLOYMENT_WORKER }}
