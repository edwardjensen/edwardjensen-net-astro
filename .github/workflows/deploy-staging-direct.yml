name: Deploy Staging Site

# Builds main branch from the content relay and deploys to the Cloudflare staging worker.
#
# Deploys to the "staging" wrangler environment (edwardjensen-net-astro-staging),
# a separate worker from production. Does not touch production traffic.

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy to Cloudflare Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        run: |
          BUILD_DATE=$(TZ=${{ vars.TIMEZONE }} date +'%-d %B %Y')
          cat > src/data/buildinfo.ts << HEREDOC
          // Auto-generated by CI/CD. Do not edit manually.
          export const buildInfo = {
            commit: "${{ github.sha }}",
            buildId: "${{ github.run_id }}",
            buildDate: "${BUILD_DATE}",
            version: "main-$(git rev-parse --short HEAD)",
            buildName: "${{ github.workflow }}",
            siteTitle: "Edward Jensen [STAGING]",
          } as const;
          HEREDOC

      - name: Build site
        env:
          CONTENT_RELAY_URL: ${{ secrets.CONTENT_RELAY_URL }}
          CONTENT_RELAY_READ_KEY: ${{ secrets.CONTENT_RELAY_READ_KEY }}
        run: npm run build

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Workers (staging)
        # Deploys to the staging worker using the name from secrets.CF_DEPLOYMENT_WORKER.
        # Uses the adapter-generated dist/server/wrangler.json which has the correct
        # entry point (dist/server/entry.mjs) and asset paths (dist/client/).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config dist/server/wrangler.json --name ${{ secrets.CF_DEPLOYMENT_WORKER }}
