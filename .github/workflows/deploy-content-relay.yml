name: Deploy Content Relay Worker

# Deploys the Cloudflare KV content relay worker whenever its source files change.
# This is the worker that caches Payload CMS REST API responses in Cloudflare KV,
# making content available to GitHub Actions builds without VPN access.
#
# TEMPORARILY DEACTIVATED (2026-04-04): Automatic deployments paused while
# the content relay architecture is being redesigned. All builds now fetch
# directly from the CMS via Tailscale VPN (see contexts/CONTENT_RELAY_BYPASS.md).
# To re-enable, restore the commented-out push trigger below.

on:
  # Temporarily disabled — see comment above.
  # push:
  #   branches: [main]
  #   paths:
  #     - 'cloudflare-workers/content-relay/**'
  #     - '.github/workflows/deploy-content-relay.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: cloudflare-workers/content-relay

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config wrangler.toml
